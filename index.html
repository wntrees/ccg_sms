<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Canopy Capital — Contact Upload Tool</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #f5f5f3;
        color: #1a1a1a;
        min-height: 100vh;
        padding: 2rem 1rem;
      }
      #root {
        max-width: 900px;
        margin: 0 auto;
        background: #ffffff;
        border-radius: 12px;
        border: 1px solid #e5e5e0;
        padding: 2rem;
      }

      /* CSS variables to match claude.ai design system */
      :root {
        --color-background-primary: #ffffff;
        --color-background-secondary: #f5f5f3;
        --color-background-tertiary: #eeede8;
        --color-background-info: #e6f1fb;
        --color-background-success: #eaf3de;
        --color-background-warning: #faeeda;
        --color-background-danger: #fcebeb;

        --color-text-primary: #1a1a1a;
        --color-text-secondary: #6b6b6b;
        --color-text-tertiary: #a0a0a0;
        --color-text-info: #0c447c;
        --color-text-success: #3b6d11;
        --color-text-warning: #854f0b;
        --color-text-danger: #a32d2d;

        --color-border-tertiary: rgba(0,0,0,0.1);
        --color-border-secondary: rgba(0,0,0,0.18);
        --color-border-primary: rgba(0,0,0,0.28);
        --color-border-info: #85b7eb;
        --color-border-success: #97c459;
        --color-border-warning: #ef9f27;
        --color-border-danger: #f09595;

        --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        --border-radius-md: 8px;
        --border-radius-lg: 12px;
        --border-radius-xl: 16px;
      }

      /* Base button style */
      button {
        font-family: var(--font-sans);
        font-size: 14px;
        font-weight: 400;
        padding: 8px 16px;
        border-radius: var(--border-radius-md);
        border: 0.5px solid var(--color-border-secondary);
        background: transparent;
        color: var(--color-text-primary);
        cursor: pointer;
        transition: background 0.12s, transform 0.1s;
      }
      button:hover { background: var(--color-background-secondary); }
      button:active { transform: scale(0.98); }
      button:disabled { opacity: 0.5; cursor: not-allowed; }

      /* Base select style */
      select {
        font-family: var(--font-sans);
        font-size: 13px;
        padding: 7px 10px;
        border-radius: var(--border-radius-md);
        border: 0.5px solid var(--color-border-secondary);
        background: var(--color-background-primary);
        color: var(--color-text-primary);
        appearance: auto;
      }

      .sr-only {
        position: absolute; width: 1px; height: 1px;
        padding: 0; margin: -1px; overflow: hidden;
        clip: rect(0,0,0,0); white-space: nowrap; border: 0;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
