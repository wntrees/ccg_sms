<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Canopy Capital — Lead Outreach Tool</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --green-900: #1a2e1a;
        --green-800: #1f3d1f;
        --green-700: #2a5228;
        --green-600: #346332;
        --green-500: #3e7a3b;
        --green-200: #c2d9be;
        --green-100: #e0ede0;
        --green-50:  #f2f8f2;

        --gold-500: #c9a84c;
        --gold-400: #d4b568;
        --gold-300: #dfc27e;
        --gold-100: #f5edda;
        --gold-50:  #faf6ed;

        --white: #ffffff;
        --cream: #fdfcf8;
        --border: rgba(26,46,26,0.12);
        --border-strong: rgba(26,46,26,0.22);

        --font-display: 'Playfair Display', Georgia, serif;
        --font-body: 'DM Sans', system-ui, sans-serif;
        --radius-sm: 6px;
        --radius-md: 10px;
        --radius-lg: 16px;

        --shadow-sm: 0 1px 3px rgba(26,46,26,0.08);
        --shadow-md: 0 4px 12px rgba(26,46,26,0.10);
      }

      body {
        font-family: var(--font-body);
        background: var(--cream);
        color: var(--green-900);
        min-height: 100vh;
        font-size: 15px;
        line-height: 1.6;
      }

      #root { min-height: 100vh; display: flex; flex-direction: column; }

      button {
        font-family: var(--font-body);
        cursor: pointer;
        transition: all 0.18s ease;
      }
      button:active:not(:disabled) { transform: scale(0.97); }
      button:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

      select, input, textarea {
        font-family: var(--font-body);
        color: var(--green-900);
        background: var(--white);
        border: 1px solid var(--border-strong);
        border-radius: var(--radius-sm);
        padding: 8px 10px;
        outline: none;
        transition: border-color 0.15s;
      }
      select:focus, input:focus, textarea:focus { border-color: var(--green-500); }
      textarea { resize: vertical; line-height: 1.6; }

      .sr-only {
        position: absolute; width: 1px; height: 1px;
        padding: 0; margin: -1px; overflow: hidden;
        clip: rect(0,0,0,0); white-space: nowrap; border: 0;
      }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(14px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      .fade-up { animation: fadeUp 0.35s ease both; }
      .spin { animation: spin 0.8s linear infinite; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
